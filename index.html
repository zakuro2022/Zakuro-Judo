// KUB SVG
// ═══════════════════════════════════════════════
const CW=96, CH=46, CX=48, CY=70, CDX=68, CDY=34;
function KubSVG({ layers, activeRow, onRowClick }) {
  const tx0=CX+CDX, ty0=CY-CDY;
  return (
    <svg viewBox="0 0 340 400" style={{width:"100%",maxWidth:340}}>
      <polygon points={`${tx0},${ty0} ${tx0+2*CW},${ty0} ${CX+2*CW},${CY} ${CX},${CY}`} fill={layers[0].topC} stroke="white" strokeWidth="1.8"/>
      <line x1={tx0+CW} y1={ty0} x2={CX+CW} y2={CY} stroke="white" strokeWidth="1.5"/>
      <text fontFamily="monospace" fontSize="9" fill="#555" x={tx0+CW} y={ty0-6} textAnchor="middle">(bak)</text>
      <text fontFamily="monospace" fontSize="9" fill="#555" x={CX-5} y={CY+5} textAnchor="end" transform={`rotate(-25,${CX-5},${CY+5})`}>(höger)</text>
      <text fontFamily="monospace" fontSize="9" fill="#555" x={CX+2*CW+CDX+3} y={ty0+7}>(vänster)</text>
      {layers.map((c,r) => {
        const fy=CY+r*CH, op=activeRow===null?1:activeRow===r?1:0.2;
        const ry0=fy-CDY, ry1=fy+CH-CDY;
        return (
          <g key={r} opacity={op} onClick={()=>onRowClick(r)} style={{cursor:"pointer"}}>
            <rect x={CX} y={fy} width={CW} height={CH} fill={c.topC} stroke="white" strokeWidth="1.8"/>
            <rect x={CX+CW} y={fy} width={CW} height={CH} fill={c.topC} stroke="white" strokeWidth="1.8"/>
            <polygon points={`${CX+2*CW},${fy} ${CX+2*CW+CDX},${ry0} ${CX+2*CW+CDX},${ry1} ${CX+2*CW},${fy+CH}`} fill={c.rightC} stroke="white" strokeWidth="1.8"/>
            {activeRow===r && <rect x={CX-2} y={fy-2} width={2*CW+4} height={CH+4} fill="none" stroke="#1a1410" strokeWidth="2.5" rx="2"/>}
          </g>
        );
      })}
      <rect x={CX} y={CY} width={2*CW} height={7*CH} fill="none" stroke="#555" strokeWidth="1.4"/>
      <line x1={CX+CW} y1={CY} x2={CX+CW} y2={CY+7*CH} stroke="#555" strokeWidth="0.8"/>
      <polygon points={`${CX+2*CW},${CY} ${CX+2*CW+CDX},${CY-CDY} ${CX+2*CW+CDX},${CY+7*CH-CDY} ${CX+2*CW},${CY+7*CH}`} fill="none" stroke="#555" strokeWidth="1.4"/>
      <text fontFamily="monospace" fontSize="9" fill="#555" x={CX+CW} y={CY+7*CH+14} textAnchor="middle">(fram)</text>
    </svg>
  );
}

                const oppLostShido  = matchScore.oppShido >= 3;

                    <ScoreRow label="Motståndarens ippon" val={matchScore.opp} max={1} color="#c0392b"

                      (matchScore.my>=1||matchScore.myWazari>=2||matchScore.oppShido>=3)?"#DFF2D0":

                      color:(matchScore.my>=1||matchScore.myWazari>=2||matchScore.oppShido>=3)?"#27500A":
                            (matchScore.opp>=1||matchScore.oppWazari>=2||matchScore.myShido>=3)?"#c0392b":ink}}>
                      {(matchScore.my>=1||matchScore.myWazari>=2||matchScore.oppShido>=3) ? "✓ IPPON — DIN VINST" :
                       (matchScore.opp>=1||matchScore.oppWazari>=2||matchScore.myShido>=3) ? "✗ IPPON — FÖRLUST" : ""}
                    </div>

                <div style={{fontSize:"0.48rem",textTransform:"uppercase",color:mid,marginBottom:2}}>Matchresultat</div>

                  <button key={r} onClick={()=>setMatchResult(matchResult===r?"":r)}
                    style={{fontFamily:"'Courier New',monospace",fontSize:"0.62rem",padding:"4px 8px",borderRadius:4,cursor:"pointer",fontWeight:matchResult===r?700:400,
                      background:matchResult===r?(r==="win"?"#3B7A18":r==="loss"?"#c0392b":"#909088"):"transparent",
                      color:matchResult===r?paper:(r==="win"?"#3B7A18":r==="loss"?"#c0392b":"#606060"),

                  style={{flex:1,minWidth:90,padding:"8px 8px",borderRadius:6,cursor:"pointer",border:`1.5px solid ${matchPhase===id?ink:border}`,background:matchPhase===id?"#1a1410":"transparent",transition:"all 0.12s"}}>

                    </div>
                  )}

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8,marginTop:4}}>

      </div>

      {/* Stance/grepp context */}
      {(stance||favGrepp) && (
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
          {stance&&<span style={{fontSize:"0.62rem",background:ink,color:"#f5f0e8",padding:"2px 8px",borderRadius:4,fontWeight:700}}>{stance==="höger"?"► Höger":"◄ Vänster"}</span>}
          {favGrepp&&<span style={{fontSize:"0.62rem",background:"#fdf8ee",color:gold,padding:"2px 8px",borderRadius:4,fontWeight:600,border:`1px solid ${gold}40`}}>{favGrepp}</span>}
        </div>

      {/* Kumikata */}
      {km && (
        <div style={{background:bg,border:`1.5px solid ${border}`,borderLeft:`3px solid ${gold}`,padding:"0.7rem 0.9rem",marginBottom:"1rem"}}>

              <div style={{fontSize:"0.62rem"}}><span style={{fontSize:"0.48rem",textTransform:"uppercase",color:"#2c7a4a",fontWeight:700,display:"block"}}>Vänster hand</span>{km.toriV}</div>

      {direkt.length>0&&(<><Divider>Direkta kombinationer</Divider><div style={{display:"grid",gap:"0.45rem",marginBottom:"1rem"}}>{direkt.map((c,i)=>{const to=techniques.find(t=>t.id===c.to);if(!to)return null;const tcc=CAT_COLOR[to.cat];const isSelCombo=selectedComboId===to.id;return(<ComboCard key={i} accent={isSelCombo?"#b8860b":red} onClick={()=>{setSelectedId(to.id);setSelectedComboId(to.id);}}><span style={{fontWeight:700,fontSize:"0.76rem"}}>{tech.sv}</span><span style={{color:red,margin:"0 0.4rem"}}>→</span><span style={{fontSize:"0.76rem"}}>{to.sv}</span><span style={{fontSize:"0.5rem",textTransform:"uppercase",background:tcc.tag,color:tcc.dot,padding:"0.1rem 0.35rem",borderRadius:2,marginLeft:"0.4rem"}}>{CAT_NAMES[to.cat]}</span><div style={{fontSize:"0.6rem",color:mid,marginTop:"0.15rem"}}>{c.note}</div></ComboCard>);})}</div></>)}

            </div>
          </div>
        </>
      )}

      {showRev&&inCombos.length>0&&(<><Divider>Kan föregås av</Divider><div style={{display:"grid",gap:"0.45rem",marginBottom:"1rem"}}>{inCombos.map((c,i)=>{const from=techniques.find(t=>t.id===c.from);if(!from)return null;return(<ComboCard key={i} accent="#3a2a1a" onClick={()=>setSelectedId(from.id)}><span style={{fontWeight:700,fontSize:"0.76rem",color:mid}}>{from.sv}</span><span style={{color:mid,margin:"0 0.4rem"}}>→</span><span style={{fontSize:"0.76rem"}}>{tech.sv}</span><div style={{fontSize:"0.6rem",color:mid,marginTop:"0.15rem"}}>{c.note}</div></ComboCard>);})}</div></>)}

      {outCombos.length===0&&ashiFollowUp.length===0&&<div style={{color:mid,fontSize:"0.72rem",marginTop:"1rem",fontStyle:"italic"}}>Inga kombinationer registrerade.</div>}
      <div style={{marginTop:"1rem",paddingTop:"0.8rem",borderTop:`1px solid ${border}`,display:"flex",gap:"1.5rem",flexWrap:"wrap"}}>
        {[["Direkta",direkt.length],["Motrörelse",motror.length],["Totalt",outCombos.length],...(showRev?[["Varifrån",inCombos.length]]:[])].map(([l,n])=>(
          <div key={l}><div style={{fontSize:"1.2rem",fontWeight:700}}>{n}</div><div style={{fontSize:"0.52rem",textTransform:"uppercase",letterSpacing:"0.1em",color:mid}}>{l}</div></div>
        ))}
      </div>
    </>
  );
}

// ═══════════════════════════════════════════════
// KUMIKATA WIZARD
// ═══════════════════════════════════════════════
function KumikataWizard({ tori, setTori, uke, setUke, onNavigate, ink, mid, border, gold, green, paper }) {
  const tipIds = (tori&&uke) ? (KUMI_TIPS[tori]?.[uke]||[]) : [];
  const tips   = tipIds.map(id=>techniques.find(t=>t.id===id)).filter(Boolean);
  const ukeC   = "#8a4a2c";
  const sel    = { width:"100%",padding:"7px 10px",fontSize:11,background:paper,border:`1.5px solid ${border}`,borderRadius:6,color:ink,outline:"none",fontFamily:"'Courier New',monospace",cursor:"pointer" };
  const circ   = (active,col) => ({ width:22,height:22,borderRadius:"50%",background:active?col:"#ccc",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:11,fontWeight:700,flexShrink:0 });
  return (
    <div style={{maxWidth:520,margin:"0 auto",padding:"0.8rem 0.5rem"}}>
      <div style={{marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
          <div style={circ(!!tori,green)}>1</div>
          <div style={{fontSize:"0.65rem",textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700,color:tori?green:mid}}>Tori — välj ditt grepp</div>
        </div>
        <select value={tori} onChange={e=>{setTori(e.target.value);setUke("");}} style={sel}>
          <option value="">— Välj Tori-grepp —</option>
          {GREPP_OPTIONS.map(g=><option key={g} value={g}>{g}</option>)}
        </select>
      </div>
      {tori && (
        <div style={{marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <div style={circ(!!uke,ukeC)}>2</div>
            <div style={{fontSize:"0.65rem",textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700,color:uke?ukeC:mid}}>Uke — välj motståndarens grepp</div>
          </div>
          <select value={uke} onChange={e=>setUke(e.target.value)} style={{...sel,border:`1.5px solid ${uke?ukeC:border}`}}>
            <option value="">— Välj Uke-grepp —</option>
            {UKE_GREPP.map(g=><option key={g} value={g}>{g}</option>)}
          </select>
          {uke&&<div style={{marginTop:8,padding:"6px 10px",background:"#faeae0",borderRadius:4,border:`1px solid ${ukeC}40`,fontSize:"0.7rem",color:ukeC,fontWeight:600}}>✓ {uke}</div>}
        </div>
      )}
      {tori&&uke&&(
        <div style={{borderRadius:8,border:`1.5px solid ${gold}`,background:"#fdf8ee",padding:"0.9rem 1rem"}}>
          <div style={{fontSize:"0.58rem",textTransform:"uppercase",letterSpacing:"0.12em",color:gold,fontWeight:700,marginBottom:"0.8rem",display:"flex",alignItems:"center",gap:"0.5rem"}}>
            ★ Rekommenderade tekniker<div style={{flex:1,height:1,background:"#e8d8a0"}}/>
          </div>
          {tips.length===0
            ?<div style={{fontSize:10,color:mid,fontStyle:"italic"}}>Inga tips för denna kombination.</div>
            :<div style={{display:"flex",flexDirection:"column",gap:6}}>
              {tips.map((t,i)=>{
                const cc=CAT_COLOR[t.cat];
                return (
                  <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",background:paper,border:`1px solid ${border}`,borderLeft:`3px solid ${cc.dot}`,borderRadius:4}}>
                    <div style={{width:20,height:20,borderRadius:"50%",background:cc.tag,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:cc.dot,flexShrink:0}}>{i+1}</div>
                    <div><div style={{fontSize:"0.78rem",fontWeight:700}}>{t.sv}</div><div style={{fontSize:"0.55rem",textTransform:"uppercase",color:cc.dot,marginTop:1}}>{CAT_NAMES[t.cat]}</div></div>
                  </div>
                );
              })}
            </div>
          }
          <div style={{marginTop:14,display:"flex",gap:8,flexWrap:"wrap"}}>
            <button onClick={()=>onNavigate("koncept")} style={{fontFamily:"'Courier New',monospace",fontSize:"0.6rem",padding:"5px 12px",borderRadius:4,cursor:"pointer",background:green,border:`1px solid ${green}`,color:"#fff",fontWeight:700}}>→ Gå till Kampkoncept</button>
            <button onClick={()=>{setTori("");setUke("");}} style={{fontFamily:"'Courier New',monospace",fontSize:"0.6rem",padding:"5px 10px",borderRadius:4,cursor:"pointer",background:"transparent",border:`1px solid ${mid}`,color:mid}}>↺ Börja om</button>
          </div>
        </div>
      )}
    </div>
  );
}

function Divider({children}){return <div style={{fontSize:"0.55rem",textTransform:"uppercase",letterSpacing:"0.12em",color:"#8a7a6a",marginBottom:"0.5rem",display:"flex",alignItems:"center",gap:"0.5rem"}}>{children}<div style={{flex:1,height:1,background:"#e0d8cc"}}/></div>;}
function ComboCard({children,accent,onClick}){return <div onClick={onClick} style={{background:"#f5f0e8",border:"1.5px solid #e0d8cc",borderLeft:`3px solid ${accent}`,padding:"0.55rem 0.8rem",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.borderColor="#8a7a6a"} onMouseLeave={e=>e.currentTarget.style.borderColor="#e0d8cc"}>{children}</div>;}

// ═══════════════════════════════════════════════
// STRATEGI & TAKTIK COMPONENT
// ═══════════════════════════════════════════════
function StrategiBlock({ stance, favGrepp, standardTechs, selectedComboTech, oppTechs, oppGrepp, oppStance, recIds, setSelectedId, setMainTab, ink, mid, border, red, gold, green, paper, bg }) {

  const hasData = stance||favGrepp||standardTechs.length>0||oppGrepp||oppTechs.length>0;

  // Build strategy points based on selections
  const strategy = [];

  // Grepp-analys
  if(favGrepp && oppGrepp) {
    const counterIds = KUMI_TIPS[favGrepp]?.[oppGrepp] || [];
    const counters = counterIds.map(id=>techniques.find(t=>t.id===id)).filter(Boolean);
    strategy.push({
      title: "Grepp-strategi",
      icon: "🤜",
      color: gold,
      bg: "#fdf8ee",
      bdr: gold,
      points: [
        `Ditt grepp: ${favGrepp}`,
        `Motståndarens grepp: ${oppGrepp}`,
        counters.length>0 ? `Utnyttja greppläget med: ${counters.slice(0,3).map(t=>t.sv).join(", ")}` : "Ingen klar fördel — fokus på kuzushi",
      ],
      techs: counters.slice(0,3),
    });
  }

  // Stans-analys
  if(stance && oppStance) {
    const same = stance === oppStance;
    strategy.push({
      title: "Stans-analys",
      icon: "⚖️",
      color: "#2c5f8a",
      bg: "#e8f0fa",
      bdr: "#2c5f8a",
      points: same
        ? [
            `Båda ${stance} — spegelbild`,
            "O-uchi-gari och Ko-uchi-gari fungerar bra i spegelläge",
            "De-ashi-harai är effektiv när stansen är synkad",
          ]
        : [
            `Du ${stance}, motståndaren ${oppStance} — korsläge`,
            "O-soto-gari är stark mot kors-stans",
            "Tai-otoshi och Seoi-nage utnyttjar kors-grepp effektivt",
          ],
      techs: same
        ? ["o-uchi-gari","de-ashi-harai","ko-uchi-gari"].map(id=>techniques.find(t=>t.id===id)).filter(Boolean)
        : ["o-soto-gari","tai-otoshi","seoi-nage"].map(id=>techniques.find(t=>t.id===id)).filter(Boolean),
    });
  }

  // Standard teknik-taktik
  if(standardTechs.length>0) {
    const ashiTechs = standardTechs.filter(t=>t.cat==="ashi-waza");
    const teTechs   = standardTechs.filter(t=>t.cat==="te-waza");
    const koshiTechs= standardTechs.filter(t=>t.cat==="koshi-waza");
    const pts = [];
    if(ashiTechs.length>0) pts.push(`Starta med ${ashiTechs.map(t=>t.sv).join(" / ")} för att bryta balans`);
    if(ashiTechs.length>0) pts.push("Ashi-waza tvingar uke att förflytta — följ upp med Te-waza eller Koshi-waza");
    if(teTechs.length>0||koshiTechs.length>0) pts.push(`Avsluta med ${[...teTechs,...koshiTechs].map(t=>t.sv).join(" / ")}`);
    if(selectedComboTech) pts.push(`Planerad kombination: ${standardTechs[0]?.sv} → ${selectedComboTech.sv}`);
    strategy.push({
      title: "Teknik-sekvens",
      icon: "⚡",
      color: "#2c7a4a",
      bg: "#e2f5e8",
      bdr: "#2c7a4a",
      points: pts.length>0 ? pts : ["Välj standard tekniker för att se sekvens-taktik"],
      techs: [...standardTechs, selectedComboTech].filter(Boolean),
    });
  }

  // Mot motståndarens tekniker
  if(oppTechs.length>0) {
    const counters = [];
    oppTechs.forEach(ot=>{
      combos.filter(c=>c.from===ot.id).forEach(c=>{
        const to=techniques.find(t=>t.id===c.to);
        if(to&&!counters.find(x=>x.id===to.id)) counters.push(to);
      });
    });
    strategy.push({
      title: "Försvar mot motståndaren",
      icon: "🛡",
      color: "#c0392b",
      bg: "#fde8e6",
      bdr: "#c0392b",
      points: [
        `Motståndaren använder: ${oppTechs.map(t=>t.sv).join(", ")}`,
        counters.length>0 ? `Var beredd på följdattacker: ${counters.slice(0,3).map(t=>t.sv).join(", ")}` : "Studera motståndarens kombinationer",
        "Håll låg tyngdpunkt och kontrollera avstånd",
      ],
      techs: [],
    });
  }

  // Allmän taktik om lite data
  if(!hasData) {
    strategy.push({
      title: "Fyll i dina val",
      icon: "📋",
      color: mid,
      bg: paper,
      bdr: border,
      points: [
        "Gå till Teknik-fliken och välj stans, kumikata och standardtekniker",
        "Gå till Motståndare-fliken och välj motståndarens profil",
        "Återkom hit för personlig strategi och taktik",
      ],
      techs: [],
    });
  }

  return (
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {strategy.map((s,i)=>(
        <div key={i} style={{borderRadius:8,border:`1.5px solid ${s.bdr}`,background:s.bg,padding:"0.9rem 1rem",overflow:"hidden"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <span style={{fontSize:"1.1rem"}}>{s.icon}</span>
            <div style={{fontSize:"0.62rem",textTransform:"uppercase",letterSpacing:"0.1em",color:s.color,fontWeight:700,flex:1}}>{s.title}</div>
          </div>
          <ul style={{marginLeft:14,marginBottom:s.techs.length>0?8:0}}>
            {s.points.map((p,j)=>(
              <li key={j} style={{fontSize:"0.72rem",lineHeight:1.7,color:ink,listStyle:"disc",marginBottom:2}}>{p}</li>
            ))}
          </ul>
          {s.techs.length>0 && (
            <div style={{display:"flex",flexWrap:"wrap",gap:5,paddingTop:6,borderTop:`1px solid ${s.bdr}40`}}>
              {s.techs.map(t=>{
                const cc=CAT_COLOR[t.cat];
                return (
                  <span key={t.id} onClick={()=>{setSelectedId(t.id);setMainTab("kombdb");}}
                    style={{fontSize:"0.65rem",fontWeight:700,background:paper,color:cc.dot,padding:"3px 8px",borderRadius:4,cursor:"pointer",border:`1px solid ${cc.dot}40`}}>
                    {t.sv}
                  </span>
                );
              })}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}
